CONDA_BUILD_SYSROOT:
  - /opt/MacOSX11.3.sdk  # [osx]

SDKROOT:
  - /opt/MacOSX11.3.sdk  # [osx]

MACOSX_DEPLOYMENT_TARGET:
  - 11.3                 # [osx]

target_platform:                                                                                                        
  - osx-arm64            # [osx]
  - osx-64               # [osx]
  - linux-aarch64        # [linux]
  - linux-64             # [linux]

c_compiler_version:
  - '>=15,<16'           # [linux]
  - '>=22,<23'           # [osx]

cxx_compiler_version:
  - '>=15,<16'           # [linux]
  - '>=22,<23'           # [osx]

clang_format:
  - '>=22,<23'

clangxx:
  - '>=22,<23'

libclang:
  - '>=22,<23'

python:
  - 3.12
  - 3.13
  - 3.14

fmt:
  - '>=12.1'

openssl:
  - '>=3.6'

libprotobuf:
   - '>=6.33'
